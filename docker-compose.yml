x-hugo-image: &hugo-image ${HUGO_IMAGE}

services:
  hugo:
    image: *hugo-image
    command: server --bind 0.0.0.0 --buildDrafts --disableFastRender
    ports:
      - "1313:1313"
    volumes:
      - ./williamblack-dev:/project
    working_dir: /project

  hugo-init:
    image: *hugo-image
    profiles: ["init"]
    command: new site williamblack-dev
    volumes:
      - .:/project
    working_dir: /project
